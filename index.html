<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="robots" content="noindex, nofollow" />

    <title>Aura Log</title>

    <meta name="description" content="My migraine log and dashboard." />
    <meta name="theme-color" content="#000000" />

    
    <script type="module" crossorigin src="/aura-log/assets/index-dd860c2c.js"></script>
    <link rel="stylesheet" href="/aura-log/assets/index-83dae132.css">
  </head>
  <body>
    <header class="header">
        <h1>Aura Log</h1>
        <p>
          <a href="/headaches.json">View raw data.</a>
        </p>
      </header>
    <main class="flow">
      <calendar-heatmap charttitle="Calendar View" theme="orange"></calendar-heatmap>
      <bar-chart charttitle="Migraines by Day of Week"></bar-chart>
      <histogram-chart charttitle="Migraines by Hour of Day"></histogram-chart>
      <div class="pieGrid">
        <pie-chart
          logdata="triggers"
          charttitle="Triggers"
          chartsubtitle="Potential triggers to bring on the headache."
        ></pie-chart>
        <pie-chart
          logdata="symptoms"
          charttitle="Symptoms"
          chartsubtitle="Symptoms or other feelings resulting from the headache."
        ></pie-chart>
        <pie-chart
          logdata="pain_areas"
          charttitle="Pain Areas"
          chartsubtitle="Parts of the head where pain was felt."
        ></pie-chart>
        <pie-chart
          logdata="medications"
          charttitle="Medications"
          chartsubtitle="Medication taken to remedy the headache."
          disablelegend
        ></pie-chart>
        <pie-chart
        logdata="sleep"
        charttitle="Sleeping vs. Awake"
        disablelegend></pie-chart>
      </div>
    </main>
  </body>
</html>
